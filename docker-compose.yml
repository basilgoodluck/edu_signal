services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://edusignal:edusignal@db:5432/edusignal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://edusignal:edusignal@db:5432/edusignal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  ml:
    build:
      context: .
      dockerfile: backend/Dockerfile.ml
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://edusignal:edusignal@db:5432/edusignal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # Run once on demand: docker compose run --rm ml
    profiles:
      - ml

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: edusignal
      POSTGRES_USER: edusignal
      POSTGRES_PASSWORD: edusignal
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edusignal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

volumes:
  pgdata:
